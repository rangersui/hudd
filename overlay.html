<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>overlay</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100vw; height: 100vh; overflow: hidden;
    background: transparent;
    font-family: 'Consolas', 'Courier New', monospace;
    pointer-events: none;
    user-select: none;
  }

  /* ── Corner brackets ── */
  .corner {
    position: fixed;
    width: 50px; height: 50px;
    border-color: rgba(0, 212, 255, 0.35);
    border-style: solid;
    border-width: 0;
  }
  .corner-tl { top: 16px; left: 16px; border-top-width: 2px; border-left-width: 2px; }
  .corner-tr { top: 16px; right: 16px; border-top-width: 2px; border-right-width: 2px; }
  .corner-bl { bottom: 16px; left: 16px; border-bottom-width: 2px; border-left-width: 2px; }
  .corner-br { bottom: 16px; right: 16px; border-bottom-width: 2px; border-right-width: 2px; }

  /* tick marks inside corners */
  .corner::before, .corner::after {
    content: '';
    position: absolute;
    background: rgba(0, 212, 255, 0.2);
  }
  .corner-tl::before { top: 14px; left: 0; width: 8px; height: 1px; }
  .corner-tl::after  { top: 0; left: 14px; width: 1px; height: 8px; }
  .corner-tr::before { top: 14px; right: 0; width: 8px; height: 1px; }
  .corner-tr::after  { top: 0; right: 14px; width: 1px; height: 8px; }
  .corner-bl::before { bottom: 14px; left: 0; width: 8px; height: 1px; }
  .corner-bl::after  { bottom: 0; left: 14px; width: 1px; height: 8px; }
  .corner-br::before { bottom: 14px; right: 0; width: 8px; height: 1px; }
  .corner-br::after  { bottom: 0; right: 14px; width: 1px; height: 8px; }

  /* ── Scan lines — barely visible ── */
  .scanlines {
    position: fixed; top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent 0px,
      transparent 3px,
      rgba(0, 200, 255, 0.012) 3px,
      rgba(0, 200, 255, 0.012) 4px
    );
  }

  /* ── Top info bar ── */
  .info-top {
    position: fixed; top: 6px; left: 76px; right: 76px;
    display: flex; justify-content: space-between;
    font-size: 10px; color: rgba(0, 212, 255, 0.4);
    letter-spacing: 1.5px;
    text-transform: uppercase;
  }

  /* ── Bottom info bar ── */
  .info-bottom {
    position: fixed; bottom: 6px; left: 76px; right: 76px;
    display: flex; justify-content: space-between;
    font-size: 10px;
  }
  .info-bottom .focus  { color: rgba(0, 255, 136, 0.45); }
  .info-bottom .status { color: rgba(0, 212, 255, 0.4); }

  /* ── Center crosshair — very dim ── */
  .crosshair { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); }
  .crosshair::before, .crosshair::after {
    content: ''; position: absolute;
    background: rgba(0, 212, 255, 0.06);
  }
  .crosshair::before { width: 24px; height: 1px; top: 0; left: -12px; }
  .crosshair::after  { width: 1px; height: 24px; left: 0; top: -12px; }

  /* ── YOLO detection boxes ── */
  #detections {
    position: fixed; top: 0; left: 0;
    width: 100vw; height: 100vh;
    pointer-events: none;
  }
  .det-box {
    position: absolute;
    border: 1.5px solid rgba(0, 255, 136, 0.6);
    pointer-events: none;
    transition: opacity 0.15s;
  }
  .det-label {
    position: absolute;
    top: -15px; left: -1px;
    font-size: 8px;
    color: inherit;
    background: rgba(0, 0, 0, 0.6);
    padding: 1px 4px;
    white-space: nowrap;
    letter-spacing: 0.5px;
  }

  /* ── Minimized-widget bucket ── */
  .bucket {
    position: fixed; bottom: 26px; left: 50%;
    transform: translateX(-50%);
    display: flex; gap: 8px;
    font-size: 10px; color: rgba(0, 212, 255, 0.3);
  }
  .bucket-item {
    padding: 2px 8px;
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 3px;
  }

  /* ── Flicker ── */
  @keyframes flicker {
    0%, 100% { opacity: 1; }
    92% { opacity: 1; }
    93% { opacity: 0.7; }
    94% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
  }
  .corner { animation: flicker 8s infinite; }

  /* ── Focus-change pulse ── */
  @keyframes pulse {
    0%   { color: rgba(0, 255, 136, 0.8); }
    100% { color: rgba(0, 255, 136, 0.45); }
  }
  .focus-pulse { animation: pulse 1s ease-out; }
</style>
</head>
<body>
  <div class="scanlines"></div>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="crosshair"></div>

  <div class="info-top">
    <span>HUD</span>
    <span id="clock"></span>
  </div>

  <div class="info-bottom">
    <span class="focus" id="focus-line">initializing...</span>
    <span class="status" id="ws-status">-- connecting</span>
  </div>

  <div id="detections"></div>
  <div class="bucket" id="bucket"></div>

<script>
  const { ipcRenderer } = require("electron");

  // ── Clock ──
  setInterval(() => {
    const el = document.getElementById("clock");
    if (el) el.textContent = new Date().toLocaleTimeString();
  }, 1000);

  // ── CDP status indicator ──
  document.getElementById("ws-status").textContent = "● CDP";
  document.getElementById("ws-status").style.color = "rgba(0,212,255,0.5)";

  // ── YOLO detection rendering (called via CDP evaluate) ──
  function renderDetections(dets) {
    const container = document.getElementById("detections");
    if (!container) return;
    container.innerHTML = "";
    const dpr = window.devicePixelRatio || 1;
    for (const d of dets) {
      const box = document.createElement("div");
      box.className = "det-box";
      box.style.left = (d.x / dpr) + "px";
      box.style.top = (d.y / dpr) + "px";
      box.style.width = (d.w / dpr) + "px";
      box.style.height = (d.h / dpr) + "px";
      if (d.color) {
        box.style.borderColor = d.color;
        box.style.color = d.color;
      }

      const label = document.createElement("span");
      label.className = "det-label";
      label.textContent = d.label + " " + Math.round(d.conf * 100) + "%";
      box.appendChild(label);

      container.appendChild(box);
    }
  }

  // ── Minimized widget indicators (from main process) ──
  const minimized = new Set();

  ipcRenderer.on("widget-minimized", (_e, id) => {
    minimized.add(id);
    updateBucket();
  });
  ipcRenderer.on("widget-restored", (_e, id) => {
    minimized.delete(id);
    updateBucket();
  });
  ipcRenderer.on("widget-closed", (_e, id) => {
    minimized.delete(id);
    updateBucket();
  });

  function updateBucket() {
    const el = document.getElementById("bucket");
    if (!el) return;
    if (minimized.size === 0) { el.innerHTML = ""; return; }
    el.innerHTML = Array.from(minimized)
      .map(id => '<span class="bucket-item">◻ ' + id + ' [F10]</span>')
      .join("");
  }
</script>
</body></html>
