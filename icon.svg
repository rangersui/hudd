<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <rect width="512" height="512" rx="80" fill="#0a0a14"/>

  <!-- corner brackets (HUD) -->
  <g stroke="#8890a0" stroke-width="8" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <polyline points="68,128 68,68 128,68"/>
    <polyline points="384,68 444,68 444,128"/>
    <polyline points="444,384 444,444 384,444"/>
    <polyline points="128,444 68,444 68,384"/>
  </g>

  <!-- orbit ring -->
  <circle cx="256" cy="256" r="128" fill="none" stroke="#50c8ff" stroke-width="3" opacity="0.7"/>

  <!-- nucleus (daemon) -->
  <circle cx="256" cy="256" r="15" fill="#50c8ff"/>

  <!-- electron (renderer) on orbit, ~45° -->
  <circle cx="346.5" cy="165.5" r="11" fill="#50c8ff"/>
</svg>
