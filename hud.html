<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: transparent;
    font-family: 'Segoe UI', monospace;
    color: #0f0;
  }

  .panel {
    width: 100%; height: 100%;
    background: rgba(10, 10, 25, 0.92);
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 10px;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .panel:hover {
    border-color: rgba(0, 212, 255, 0.6);
  }

  .header {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 12px;
    background: rgba(0, 0, 0, 0.3);
    cursor: grab;
    user-select: none;
    -webkit-app-region: drag;
  }

  .title {
    font-size: 12px; color: #00d4ff; font-weight: bold;
    text-transform: uppercase; letter-spacing: 0.5px;
  }

  .controls { display: flex; gap: 6px; -webkit-app-region: no-drag; }
  .btn {
    width: 18px; height: 18px; border-radius: 50%;
    border: none; cursor: pointer; font-size: 10px;
    display: flex; align-items: center; justify-content: center;
  }
  .btn-min { background: rgba(255, 170, 0, 0.7); color: #000; }
  .btn-min:hover { background: rgba(255, 170, 0, 1); }
  .btn-close { background: rgba(255, 60, 60, 0.7); color: #000; }
  .btn-close:hover { background: rgba(255, 60, 60, 1); }

  .body { padding: 10px 14px; flex: 1; overflow: hidden; }

  .dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .dot-on { background: #00ff88; box-shadow: 0 0 4px #00ff88; }
  .dot-off { background: #ff4444; }

  @keyframes flicker {
    0%, 100% { opacity: 1; }
    93% { opacity: 0.7; }
    94% { opacity: 1; }
    96% { opacity: 0.8; }
    97% { opacity: 1; }
  }
  .panel { animation: flicker 6s infinite; }
</style>
</head>
<body>
<div class="panel">
  <div class="header" id="drag-handle">
    <span class="title">STATUS</span>
    <div class="controls">
      <button class="btn btn-min" id="btn-min">&minus;</button>
      <button class="btn btn-close" id="btn-close">&times;</button>
    </div>
  </div>
  <div class="body">
    <div style="display:flex; gap:8px; align-items:center; margin-bottom:8px;">
      <span class="dot dot-off" id="ws-dot"></span>
      <span style="color:#aaa; font-size:12px;">engine</span>
      <span class="dot dot-on"></span>
      <span style="color:#aaa; font-size:12px;">electron</span>
    </div>
    <div style="font-size:12px; color:#888;">
      <div id="focus-line">waiting...</div>
    </div>
    <div style="font-size:11px; color:#555; margin-top:6px;" id="clock"></div>
  </div>
</div>

<script>
  const { ipcRenderer } = require("electron");

  const params = new URLSearchParams(window.location.search);
  const widgetId = params.get("id") || "status";

  document.getElementById("btn-min").addEventListener("click", () => {
    ipcRenderer.send("minimize-widget", widgetId);
  });
  document.getElementById("btn-close").addEventListener("click", () => {
    ipcRenderer.send("close-widget", widgetId);
  });

  setInterval(() => {
    const el = document.getElementById("clock");
    if (el) el.textContent = new Date().toLocaleTimeString();
  }, 1000);

  // ── CDP ready — AI sets status via evaluate() ──
  document.getElementById("ws-dot").className = "dot dot-on";
</script>
</body></html>
