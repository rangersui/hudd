<!DOCTYPE html>
<html><head>
<meta charset="utf-8">
<title>browser</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }

  .frame {
    width: 100%; height: 100%;
    border: 1px solid rgba(0, 212, 255, 0.3);
    border-radius: 8px;
    display: flex; flex-direction: column;
    overflow: hidden;
    background: rgba(10, 10, 25, 0.97);
  }

  .chrome {
    display: flex; align-items: center;
    padding: 4px 8px; gap: 4px;
    background: rgba(0, 0, 0, 0.4);
    -webkit-app-region: drag;
    user-select: none;
  }
  .nav-group { display: flex; gap: 2px; -webkit-app-region: no-drag; }
  .nav-btn {
    width: 22px; height: 22px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 4px;
    color: #888; font-size: 12px;
    cursor: pointer; display: flex;
    align-items: center; justify-content: center;
    font-family: 'Consolas', monospace;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.1); color: #ccc; }

  .url-bar {
    flex: 1; height: 22px;
    background: rgba(0,0,0,0.3);
    border: 1px solid rgba(0, 212, 255, 0.2);
    border-radius: 4px;
    color: #aaa; font-size: 11px;
    padding: 0 8px;
    font-family: 'Consolas', monospace;
    -webkit-app-region: no-drag;
    outline: none;
  }
  .url-bar:focus { border-color: rgba(0, 212, 255, 0.5); color: #ddd; }

  .controls { display: flex; gap: 4px; -webkit-app-region: no-drag; }
  .ctrl-btn {
    width: 16px; height: 16px; border-radius: 50%;
    border: none; cursor: pointer;
    font-size: 8px; display: flex;
    align-items: center; justify-content: center;
  }
  .btn-min { background: rgba(255,170,0,0.7); color: #000; }
  .btn-min:hover { background: rgba(255,170,0,1); }
  .btn-x { background: rgba(255,60,60,0.7); color: #000; }
  .btn-x:hover { background: rgba(255,60,60,1); }

  webview {
    flex: 1; width: 100%;
    border: none; border-radius: 0 0 8px 8px;
  }

  .loading-bar {
    height: 2px; background: rgba(0, 212, 255, 0.5);
    position: absolute; top: 30px; left: 0;
    width: 0; transition: width 0.3s;
  }
  .loading-bar.active { width: 60%; transition: width 2s; }
  .loading-bar.done { width: 100%; transition: width 0.2s; opacity: 0; }
</style>
</head>
<body>
<div class="frame">
  <div class="chrome">
    <div class="nav-group">
      <button class="nav-btn" id="btn-back" title="Back">&larr;</button>
      <button class="nav-btn" id="btn-fwd" title="Forward">&rarr;</button>
      <button class="nav-btn" id="btn-reload" title="Reload">&#8635;</button>
    </div>
    <input class="url-bar" id="url-bar" value="https://www.google.com" spellcheck="false">
    <div class="controls">
      <button class="ctrl-btn btn-min" id="btn-min">&minus;</button>
      <button class="ctrl-btn btn-x" id="btn-close">&times;</button>
    </div>
  </div>
  <div class="loading-bar" id="loading-bar"></div>
  <webview id="wv" src="https://www.google.com"
           allowpopups></webview>
</div>

<script>
  const { ipcRenderer } = require("electron");

  const wv = document.getElementById("wv");
  const urlBar = document.getElementById("url-bar");
  const loadBar = document.getElementById("loading-bar");

  wv.addEventListener("did-start-loading", () => {
    loadBar.className = "loading-bar active";
  });
  wv.addEventListener("did-stop-loading", () => {
    loadBar.className = "loading-bar done";
    setTimeout(() => { loadBar.className = "loading-bar"; }, 500);
  });
  wv.addEventListener("did-navigate", (e) => { urlBar.value = e.url; });
  wv.addEventListener("did-navigate-in-page", (e) => { urlBar.value = e.url; });

  urlBar.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      let url = urlBar.value.trim();
      if (!url.startsWith("http://") && !url.startsWith("https://")) {
        if (url.includes(".") && !url.includes(" ")) {
          url = "https://" + url;
        } else {
          url = "https://www.google.com/search?q=" + encodeURIComponent(url);
        }
      }
      wv.loadURL(url);
    }
  });

  document.getElementById("btn-back").addEventListener("click", () => { if (wv.canGoBack()) wv.goBack(); });
  document.getElementById("btn-fwd").addEventListener("click", () => { if (wv.canGoForward()) wv.goForward(); });
  document.getElementById("btn-reload").addEventListener("click", () => { wv.reload(); });

  document.getElementById("btn-min").addEventListener("click", () => {
    ipcRenderer.send("minimize-widget", "browser");
  });
  document.getElementById("btn-close").addEventListener("click", () => {
    ipcRenderer.send("close-widget", "browser");
  });

  // ── AI controls via CDP evaluate() ──
  // browser.evaluate("wv.loadURL('https://...')")
  // browser.evaluate("wv.executeJavaScript('document.title')")
  // browser.evaluate("wv.goBack()")
  // browser.evaluate("wv.reload()")
</script>
</body></html>
